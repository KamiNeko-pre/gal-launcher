name: Bug report
description: Report something that is not working correctly.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please do not include private game paths if you do not want them public.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Tell us what went wrong.
      placeholder: The app opened, but...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Gal Launcher
        2. Click ...
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.1.0
  - type: dropdown
    id: windows
    attributes:
      label: Windows version
      options:
        - Windows 11
        - Windows 10
        - Other
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Drag screenshots here if useful.
