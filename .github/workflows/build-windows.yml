name: Build Windows

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package Windows app
        run: npm run dist

      - name: Zip unpacked app
        shell: pwsh
        run: |
          Compress-Archive -Path "release/win-unpacked/*" -DestinationPath "Gal-Launcher-win-unpacked.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gal-Launcher-win-unpacked
          path: Gal-Launcher-win-unpacked.zip
