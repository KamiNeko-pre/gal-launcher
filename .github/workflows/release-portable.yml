name: Release Portable EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build portable exe
        run: npm run dist:portable

      - name: Upload portable exe to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/Gal Launcher.exe
          draft: false
          prerelease: false
